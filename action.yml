name: PR Title Prefix Validator
description: Validate that pull request titles start with an allowed prefix.
inputs:
  allowed-prefixes:
    description: Comma or newline separated list of allowed title prefixes.
    required: true
  github-token:
    description: GitHub token used to fetch pull request data via the API if needed.
    required: false
    default: ${{ github.token }}
runs:
  using: docker
  image: docker://ghcr.io/beryju/action-pr-lint:latest
